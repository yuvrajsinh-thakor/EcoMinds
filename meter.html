<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const APPLIANCE_TYPES = ['AC','Refrigerator','Washing Machine','Geyser','TV','Fan','Light','Microwave','Computer','Custom'];
const ROOMS = ['Living Room','Bedroom','Kitchen','Bathroom','Office','Other'];
const WATT_RANGES = { AC:[900,2000], Refrigerator:[100,200], 'Washing Machine':[400,800], Geyser:[1500,3000], TV:[50,200], Fan:[40,90], Light:[5,100], Microwave:[800,1500], Computer:[100,400], Custom:[50,2000] };
const PF_BY_TYPE = { AC:0.85, Refrigerator:0.92, 'Washing Machine':0.88, Geyser:1.0, TV:0.95, Fan:0.90, Light:1.0, Microwave:0.98, Computer:0.90, Custom:0.88 };
const TYPE_ICONS = { AC:'❄️', Refrigerator:'🧊', 'Washing Machine':'🫧', Geyser:'🔥', TV:'📺', Fan:'💨', Light:'💡', Microwave:'📻', Computer:'💻', Custom:'⚡' };

const rand = (min,max) => Math.random()*(max-min)+min;
const randInt = (min,max) => Math.floor(rand(min,max+1));
const round3 = v => Math.round(v*1000)/1000;
const now = () => new Date();
const fmtDate = d => d.toISOString().split('T')[0];
const fmtDT = d => d.toLocaleString('en-IN',{hour12:false,timeZone:'Asia/Kolkata'});

function genId() { return Math.random().toString(36).slice(2,9); }

const DEMO_APPLIANCES = [
  {id:'app1',name:'Living Room AC',type:'AC',watts:1500,voltage:230,room:'Living Room',status:'ON'},
  {id:'app2',name:'Refrigerator',type:'Refrigerator',watts:150,voltage:230,room:'Kitchen',status:'ON'},
  {id:'app3',name:'Geyser',type:'Geyser',watts:2000,voltage:230,room:'Bathroom',status:'STANDBY'},
  {id:'app4',name:'LED TV',type:'TV',watts:80,voltage:230,room:'Living Room',status:'ON'},
  {id:'app5',name:'Ceiling Fan',type:'Fan',watts:75,voltage:230,room:'Bedroom',status:'ON'},
  {id:'app6',name:'WiFi Router',type:'Computer',watts:12,voltage:230,room:'Office',status:'ON'},
];

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
function calcReading(appliance, settings, energyAcc=0) {
  const { watts, voltage, type, status } = appliance;
  const pf = PF_BY_TYPE[type] || 0.9;
  const v = voltage + rand(-8, 8);
  let activePow = 0;
  if(status==='ON') activePow = watts * rand(0.92,1.05);
  else if(status==='STANDBY') activePow = watts * rand(0.03,0.08);
  const curr = activePow > 0 ? activePow/(v*pf) : 0;
  const apparent = v*curr;
  const reactive = Math.sqrt(Math.max(0, apparent**2 - activePow**2));
  const intervalH = 5/60;
  const energyInc = activePow*intervalH/1000;
  const energyTotal = energyAcc + energyInc;
  const cost = energyTotal * (settings?.tariff||6);
  const co2 = energyTotal * (settings?.co2||0.82);
  return {
    voltage_v: round3(v),
    current_a: round3(curr),
    active_power_w: round3(activePow),
    apparent_power_va: round3(apparent),
    reactive_power_var: round3(reactive),
    power_factor: round3(pf + rand(-0.02,0.02)),
    energy_kwh: round3(energyTotal),
    cost_inr: round3(cost),
    co2_kg: round3(co2),
    thd_percent: round3(rand(2,8)),
    frequency_hz: round3(50+rand(-0.05,0.05)),
  };
}

// ─── RANDOM DATA GENERATOR ───────────────────────────────────────────────────
function getUsageMultiplier(hour, type, season, pattern) {
  let base = 0;
  if(hour>=0 && hour<5) base=0.25;
  else if(hour<9) base=0.65;
  else if(hour<17) base=0.5;
  else if(hour<22) base=0.95;
  else base=0.4;
  let sm = 1;
  if(season==='Summer') {
    if(type==='AC') sm=1.6; if(type==='Fan') sm=1.4; if(type==='Geyser') sm=0.2;
  } else if(season==='Winter') {
    if(type==='Geyser') sm=1.8; if(type==='AC') sm=0.3;
  } else if(season==='Monsoon') {
    if(type==='Fan') sm=1.2; if(type==='AC') sm=0.7;
  }
  return base * sm;
}

function getApplianceStatus(type, hour, dayOfWeek, season) {
  const isWeekend = dayOfWeek===0||dayOfWeek===6;
  if(type==='Refrigerator') return 'ON';
  if(type==='AC') {
    if(season==='Summer') return (isWeekend||(hour>=18&&hour<23))?'ON':'OFF';
    return (hour>=19&&hour<23)?'ON':'OFF';
  }
  if(type==='Geyser') return ((hour>=6&&hour<8)||(hour>=20&&hour<22))?'ON':'OFF';
  if(type==='Washing Machine') return (isWeekend&&hour>=10&&hour<12)?'ON':'OFF';
  if(type==='TV') return (hour>=19&&hour<23)?'ON':'OFF';
  if(type==='Light') return (hour>=18||hour<6)?'ON':'OFF';
  if(type==='Fan') return (hour>=7&&hour<23)?'ON':'STANDBY';
  if(type==='Computer') return 'ON';
  return 'ON';
}

function generateHistoricalData(appliances, days, intervalMin, season, settings) {
  const readings = [];
  const now = new Date();
  const totalPoints = Math.floor(days*24*60/intervalMin);
  const energyAccs = {};
  appliances.forEach(a => energyAccs[a.id]=0);
  for(let i=totalPoints; i>=0; i--) {
    const ts = new Date(now.getTime() - i*intervalMin*60000);
    const hour = ts.getHours();
    const dow = ts.getDay();
    const dayStr = fmtDate(ts);
    appliances.forEach(app => {
      const st = getApplianceStatus(app.type, hour, dow, season);
      const mult = getUsageMultiplier(hour, app.type, season, 'Residential');
      const fakePow = st==='ON'?app.watts*mult:(st==='STANDBY'?app.watts*0.05:0);
      const pf = PF_BY_TYPE[app.type]||0.9;
      const v = app.voltage + rand(-8,8);
      const curr = fakePow>0?fakePow/(v*pf):0;
      const ap = v*curr;
      const rp = Math.sqrt(Math.max(0,ap**2-fakePow**2));
      const intH = intervalMin/60;
      const eInc = fakePow*intH/1000;
      // reset at midnight
      const prevTs = new Date(ts.getTime()-intervalMin*60000);
      if(fmtDate(prevTs)!==dayStr) energyAccs[app.id]=0;
      energyAccs[app.id]+=eInc;
      const e = energyAccs[app.id];
      readings.push({
        timestamp: ts.toISOString(),
        appliance_id: app.id,
        appliance_name: app.name,
        appliance_type: app.type,
        room: app.room,
        status: st,
        voltage_v: round3(v),
        current_a: round3(curr),
        active_power_w: round3(fakePow),
        apparent_power_va: round3(ap),
        reactive_power_var: round3(rp),
        power_factor: round3(pf+rand(-0.02,0.02)),
        energy_kwh: round3(e),
        cost_inr: round3(e*(settings?.tariff||6)),
        co2_kg: round3(e*(settings?.co2||0.82)),
        thd_percent: round3(rand(2,8)),
        frequency_hz: round3(50+rand(-0.05,0.05)),
      });
    });
  }
  return readings;
}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function downloadCSV(data, filename) {
  if(!data||data.length===0) return alert('No data to export.');
  const headers = Object.keys(data[0]).join(',');
  const rows = data.map(row=>Object.values(row).map(v=>typeof v==='string'&&v.includes(',')?`"${v}"`:v).join(','));
  const csv = [headers,...rows].join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

function getFilename(prefix, ext='csv') {
  const d=new Date(); const dt=fmtDate(d); const tm=d.toTimeString().slice(0,5).replace(':','-');
  return `ecominds_${prefix}_${dt}_${tm}.${ext}`;
}

// ─── EXPORT MENU ─────────────────────────────────────────────────────────────
// Renders a split button: "↓ Export" opens a 2-option dropdown:
//   1. Download CSV file
//   2. Connect API (opens APIConnectModal)
function ExportMenu({ label='↓ Export', onCSV, apiJson, small=false }) {
  const [open, setOpen] = useState(false);
  const [showAPI, setShowAPI] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  return (
    <>
      <div className="export-menu-wrap" ref={ref}>
        <button className={`btn-green ${small?'text-xs':''}`} onClick={() => setOpen(o=>!o)}>
          {label} <span style={{fontSize:9,opacity:0.7}}>▾</span>
        </button>
        {open && (
          <div className="export-menu slide-in">
            <div className="px-3 py-2 text-xs text-gray-500 font-semibold uppercase tracking-wider" style={{borderBottom:'1px solid var(--border)'}}>Export Options</div>
            <div className="export-menu-item" onClick={()=>{setOpen(false);onCSV();}}>
              <div className="export-menu-icon csv-icon">📥</div>
              <div>
                <div className="font-semibold text-green-400">Download CSV File</div>
                <div className="text-xs text-gray-500 mt-0.5">Save .csv to your computer</div>
              </div>
            </div>
            <div className="export-menu-item" onClick={()=>{setOpen(false);setShowAPI(true);}}>
              <div className="export-menu-icon api-icon-bg">🔌</div>
              <div>
                <div className="font-semibold" style={{color:'#60A5FA'}}>Connect to Live API</div>
                <div className="text-xs text-gray-500 mt-0.5">Poll, webhook, or stream live data</div>
              </div>
            </div>
          </div>
        )}
      </div>
      {showAPI && <APIConnectModal apiJson={apiJson} onClose={()=>setShowAPI(false)}/>}
    </>
  );
}

// ─── API CONNECT MODAL ────────────────────────────────────────────────────────
function APIConnectModal({ apiJson, onClose }) {
  const [activeTab, setActiveTab] = useState('poll');
  const [pollUrl, setPollUrl] = useState('http://localhost:3000/api/ecominds/live');
  const [pollInterval, setPollInterval] = useState(30);
  const [polling, setPolling] = useState(false);
  const [pollLog, setPollLog] = useState([]);
  const [webhookUrl, setWebhookUrl] = useState('https://your-server.com/webhook/energy');
  const [webhookStatus, setWebhookStatus] = useState(null);
  const [copied, setCopied] = useState('');
  const pollRef = useRef(null);
  const jsonStr = JSON.stringify(apiJson, null, 2);

  const copySnip = (key, text) => {
    navigator.clipboard.writeText(text).then(()=>{ setCopied(key); setTimeout(()=>setCopied(''),2000); });
  };

  const startPolling = () => {
    setPolling(true);
    setPollLog([]);
    let count = 0;
    const tick = () => {
      count++;
      const ts = new Date().toLocaleTimeString('en-IN',{hour12:false});
      const totalW = apiJson.summary?.total_active_power_w || 0;
      setPollLog(l => [{id:count, ts, status:200, power:`${totalW.toFixed(1)}W`, energy:`${(apiJson.summary?.total_energy_kwh_today||0).toFixed(3)} kWh`}, ...l.slice(0,9)]);
    };
    tick();
    pollRef.current = setInterval(tick, pollInterval * 1000);
  };
  const stopPolling = () => { clearInterval(pollRef.current); setPolling(false); };
  useEffect(() => () => clearInterval(pollRef.current), []);

  const testWebhook = () => {
    setWebhookStatus('sending');
    setTimeout(() => setWebhookStatus(Math.random()>0.2?'success':'error'), 1200);
  };

  const tabs = [
    {id:'poll', icon:'🔄', label:'HTTP Poll'},
    {id:'webhook', icon:'📡', label:'Webhook'},
    {id:'stream', icon:'⚡', label:'Live Stream'},
    {id:'sdk', icon:'🐍', label:'SDK / Code'},
  ];

  const snippets = {
    js: `// JavaScript — Poll every ${pollInterval}s

// Poll on interval

// ─── STATUS DOT ───────────────────────────────────────────────────────────────
function StatusDot({status}) {
  const cls = status==='ON'?'bg-green-500 pulse-green':status==='STANDBY'?'bg-amber-500 pulse-amber':'bg-red-500';
  return <span className={`inline-block w-2.5 h-2.5 rounded-full ${cls}`}/>;
}

// ─── SUMMARY CARD ─────────────────────────────────────────────────────────────
function SummaryCard({icon, label, value, sub, color='green'}) {
  const clr = color==='green'?'text-green-400':color==='amber'?'text-amber-400':'text-red-400';
  return (
    <div className="card fade-in flex flex-col gap-2">
      <div className="text-xl">{icon}</div>
      <div className={`text-2xl font-bold mono ${clr}`}>{value}</div>
      <div className="text-xs text-gray-400">{label}</div>
      {sub&&<div className="text-xs text-gray-500">{sub}</div>}

  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [appliances, setAppliances] = useState(() => {
    try{ const s=localStorage.getItem('eco_appliances'); return s?JSON.parse(s):DEMO_APPLIANCES; }catch{ return DEMO_APPLIANCES; }
  });
  const [history, setHistory] = useState(() => {
    try{ const s=localStorage.getItem('eco_history'); return s?JSON.parse(s):[]; }catch{ return []; }
  });
  const [liveReadings, setLiveReadings] = useState({});
  const [energyAccumulators, setEnergyAccumulators] = useState({});
  const [powerHistory, setPowerHistory] = useState([]);
  const [countdown, setCountdown] = useState(30);
  const [settings, setSettings] = useState(() => {
    try{ const s=localStorage.getItem('eco_settings'); return s?JSON.parse(s):{tariff:6,co2:0.82,interval:5,voltage:230,location:'My Home',deviceId:'ECOMINDS-METER-001',autoSave:true}; }catch{ return {tariff:6,co2:0.82,interval:5,voltage:230,location:'My Home',deviceId:'ECOMINDS-METER-001',autoSave:true}; }
  });
  const [showAddModal, setShowAddModal] = useState(false);
  const [editAppliance, setEditAppliance] = useState(null);
  const [showGenModal, setShowGenModal] = useState(false);
  const [genResult, setGenResult] = useState(null);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const simIntervalRef = useRef(null);

  // Auto-generate demo history on first load
  useEffect(() => {
    if(history.length===0) {
      const h = generateHistoricalData(DEMO_APPLIANCES, 7, 5, 'Summer', settings);
      setHistory(h);
      if(settings.autoSave) localStorage.setItem('eco_history', JSON.stringify(h));
    }
  },[]);

  // Save appliances
  useEffect(() => {
    if(settings.autoSave) localStorage.setItem('eco_appliances', JSON.stringify(appliances));
  },[appliances]);

  // Save settings
  useEffect(() => {
    if(settings.autoSave) localStorage.setItem('eco_settings', JSON.stringify(settings));
  },[settings]);

  // Simulation engine
  const runSimulation = useCallback(() => {
    setEnergyAccumulators(prev => {
      const newAcc = {...prev};
      const newReadings = {};
      appliances.forEach(app => {
        const acc = newAcc[app.id]||0;
        const r = calcReading(app, settings, acc);
        newAcc[app.id] = r.energy_kwh;
        newReadings[app.id] = r;
      });
      setLiveReadings(newReadings);
      const totalW = Object.values(newReadings).reduce((s,r)=>s+r.active_power_w,0);
      const ts = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
      setPowerHistory(ph => [...ph.slice(-59), {time:ts, power:round3(totalW)}]);
      return newAcc;
    });
  }, [appliances, settings]);

  useEffect(() => {
    runSimulation();
    const cdInterval = setInterval(() => {
      setCountdown(c => {
        if(c<=1){ runSimulation(); return 30; }
        return c-1;
      });
    }, 1000);
    return () => clearInterval(cdInterval);
  }, [runSimulation]);

  const totalPower = Object.values(liveReadings).reduce((s,r)=>s+r.active_power_w,0);
  const totalCurrent = Object.values(liveReadings).reduce((s,r)=>s+r.current_a,0);
  const totalEnergy = Object.values(liveReadings).reduce((s,r)=>s+r.energy_kwh,0);
  const totalCost = Object.values(liveReadings).reduce((s,r)=>s+r.cost_inr,0);
  const totalCO2 = Object.values(liveReadings).reduce((s,r)=>s+r.co2_kg,0);

  const apiJson = useMemo(() => ({
    api_version: "1.0",
    device_id: settings.deviceId,
    location: settings.location,
    timestamp: new Date().toISOString(),
    interval_minutes: settings.interval,
    summary: {
      total_active_power_w: round3(totalPower),
      total_current_a: round3(totalCurrent),
      total_energy_kwh_today: round3(totalEnergy),
      total_cost_inr: round3(totalCost),
      total_co2_kg: round3(totalCO2),
      grid_voltage_v: round3(230+rand(-2,2)),
      grid_frequency_hz: round3(50+rand(-0.05,0.05)),
      power_factor_avg: round3(Object.values(liveReadings).reduce((s,r)=>s+r.power_factor,0)/Math.max(1,appliances.length)),
    },
    appliances: appliances.map(app => ({
      id: app.id,
      name: app.name,
      type: app.type,
      room: app.room,
      status: app.status,
      ...(liveReadings[app.id]||{}),
    }))
  }), [liveReadings, appliances, settings, totalPower, totalCurrent, totalEnergy, totalCost, totalCO2]);

  const exportLiveCSV = () => {
    const rows = appliances.map(app => ({
      timestamp: new Date().toISOString(),
      device_id: settings.deviceId,
      appliance_name: app.name,
      appliance_type: app.type,
      room: app.room,
      status: app.status,
      ...(liveReadings[app.id]||{}),
    }));
    downloadCSV(rows, getFilename('live'));
  };

  const exportHistoryCSV = (filtered=null) => downloadCSV(filtered||history, getFilename('history'));
  const exportDailySummaryCSV = () => {
    const byDay = {};
    history.forEach(r => {
      const d=r.timestamp.split('T')[0];
      if(!byDay[d]) byDay[d]={date:d,total_kwh:0,total_cost_inr:0,total_co2_kg:0,peak_power_w:0,sum_power:0,count:0,topMap:{}};
      byDay[d].total_kwh+=r.energy_kwh;
      byDay[d].total_cost_inr+=r.cost_inr;
      byDay[d].total_co2_kg+=r.co2_kg;
      if(r.active_power_w>byDay[d].peak_power_w) byDay[d].peak_power_w=r.active_power_w;
      byDay[d].sum_power+=r.active_power_w; byDay[d].count++;
      byDay[d].topMap[r.appliance_name]=(byDay[d].topMap[r.appliance_name]||0)+r.active_power_w;
    });
    const rows = Object.values(byDay).map(d=>({
      date:d.date, total_kwh:round3(d.total_kwh), total_cost_inr:round3(d.total_cost_inr),
      total_co2_kg:round3(d.total_co2_kg), peak_power_w:round3(d.peak_power_w),
      avg_power_w:round3(d.sum_power/d.count),
      top_consumer_appliance:Object.entries(d.topMap).sort((a,b)=>b[1]-a[1])[0]?.[0]||'',
    }));
    downloadCSV(rows, getFilename('daily_summary'));
  };

  const tabs = ['dashboard','appliances','api','history','settings'];
  const tabLabels = {dashboard:'📊 Dashboard', appliances:'🔌 Appliances', api:'🔗 API Output', history:'📜 History', settings:'⚙️ Settings'};

  return (
    <div className="min-h-screen" style={{background:'var(--bg)'}}>
      {/* Header */}
      <header style={{background:'var(--card)',borderBottom:'1px solid var(--border)'}} className="sticky top-0 z-50">
        <div className="max-w-screen-xl mx-auto px-4">
          <div className="flex items-center justify-between h-14">
            <div className="flex items-center gap-3">
              <span className="text-green-400 text-xl">⚡</span>
              <span className="font-bold text-green-400 mono text-sm">EcoMinds</span>
              <span className="text-gray-500 text-xs hide-mobile">Smart Meter Simulator</span>
            </div>
            <div className="flex items-center gap-3">
              <div className="flex items-center gap-2 text-xs text-gray-400">
                <span className="w-2 h-2 rounded-full bg-green-400 pulse-green inline-block"></span>
                <span className="mono hide-mobile">LIVE</span>
                <span className="mono text-green-400 font-bold">{countdown}s</span>
              </div>
              <button className="btn-green text-xs" onClick={() => setShowGenModal(true)}>🎲 Generate Data</button>
            </div>
          </div>
          {/* Tabs */}
          <div className="flex gap-0 overflow-x-auto">
            {tabs.map(t => (
              <button key={t} onClick={()=>setTab(t)}
                className={`px-4 py-2.5 text-xs font-medium transition-all whitespace-nowrap ${tab===t?'tab-active text-green-400':'text-gray-400 hover:text-gray-200'}`}>
                {tabLabels[t]}
              </button>
            ))}
          </div>
        </div>
      </header>

      <main className="max-w-screen-xl mx-auto px-4 py-6">
        {tab==='dashboard' && <DashboardTab appliances={appliances} liveReadings={liveReadings} powerHistory={powerHistory} totalPower={totalPower} totalCurrent={totalCurrent} totalEnergy={totalEnergy} totalCost={totalCost} totalCO2={totalCO2} history={history} onExportLive={exportLiveCSV} onExportApplianceCSV={(app)=>{const rows=history.filter(r=>r.appliance_id===app.id);downloadCSV(rows,getFilename(`${app.name.replace(/\s/g,'_')}`));}} settings={settings} apiJson={apiJson}/>}
        {tab==='appliances' && <AppliancesTab appliances={appliances} setAppliances={setAppliances} liveReadings={liveReadings} onAdd={()=>setShowAddModal(true)} onEdit={setEditAppliance} onDelete={setShowDeleteConfirm} settings={settings}/>}
        {tab==='api' && <APITab json={apiJson} onExportLive={exportLiveCSV}/>}
        {tab==='history' && <HistoryTab history={history} appliances={appliances} onExport={exportHistoryCSV} onExportSummary={exportDailySummaryCSV} onClear={()=>setShowClearConfirm(true)} onGenerate={()=>setShowGenModal(true)} apiJson={apiJson}/>}
        {tab==='settings' && <SettingsTab settings={settings} setSettings={setSettings} onReset={()=>{if(confirm('Reset ALL data?')){localStorage.clear();window.location.reload();}}}/>}
      </main>

      {/* Modals */}
      {showAddModal && <AddEditModal appliance={null} onSave={(a)=>{setAppliances(p=>[...p,{...a,id:genId()}]);setShowAddModal(false);}} onClose={()=>setShowAddModal(false)}/>}
      {editAppliance && <AddEditModal appliance={editAppliance} onSave={(a)=>{setAppliances(p=>p.map(x=>x.id===a.id?a:x));setEditAppliance(null);}} onClose={()=>setEditAppliance(null)}/>}
      {showGenModal && <GenerateModal appliances={appliances} settings={settings} onGenerate={(data,summary)=>{setHistory(data);if(settings.autoSave)localStorage.setItem('eco_history',JSON.stringify(data));setGenResult(summary);setShowGenModal(false);}} onClose={()=>setShowGenModal(false)}/>}
      {genResult && <div className="modal-overlay" onClick={()=>setGenResult(null)}><div className="modal slide-in text-center"><div className="text-4xl mb-3">✅</div><h2 className="text-lg font-bold text-green-400 mb-2">Data Generated!</h2><p className="text-sm text-gray-300 mb-4">{genResult}</p><button className="btn-solid" onClick={()=>setGenResult(null)}>View Data</button></div></div>}
      {showDeleteConfirm && <div className="modal-overlay"><div className="modal slide-in"><h3 className="font-bold mb-3 text-red-400">Delete Appliance?</h3><p className="text-sm text-gray-300 mb-4">Remove "{showDeleteConfirm.name}"?</p><div className="flex gap-3 justify-end"><button className="btn-green" onClick={()=>setShowDeleteConfirm(null)}>Cancel</button><button className="btn-red" onClick={()=>{setAppliances(p=>p.filter(x=>x.id!==showDeleteConfirm.id));setShowDeleteConfirm(null);}}>Delete</button></div></div></div>}
      {showClearConfirm && <div className="modal-overlay"><div className="modal slide-in"><h3 className="font-bold mb-3 text-red-400">Clear All History?</h3><p className="text-sm text-gray-300 mb-4">This cannot be undone.</p><div className="flex gap-3 justify-end"><button className="btn-green" onClick={()=>setShowClearConfirm(false)}>Cancel</button><button className="btn-red" onClick={()=>{setHistory([]);localStorage.removeItem('eco_history');setShowClearConfirm(false);}}>Clear</button></div></div></div>}
    </div>
  );
}

// ─── DASHBOARD TAB ─────────────────────────────────────────────────────────────
function DashboardTab({appliances, liveReadings, powerHistory, totalPower, totalCurrent, totalEnergy, totalCost, totalCO2, history, onExportLive, onExportApplianceCSV, settings, apiJson}) {
  const pieData = appliances.map(app=>({name:app.name, value:round3((liveReadings[app.id]?.active_power_w)||0)})).filter(d=>d.value>0);
  const COLORS = ['#22C55E','#F59E0B','#EF4444','#3B82F6','#A855F7','#EC4899','#14B8A6','#F97316'];

  const roomData = useMemo(()=>{
    const rm = {};
    appliances.forEach(app=>{
      const r = app.room;
      if(!rm[r]) rm[r]=0;
      rm[r]+=(liveReadings[app.id]?.energy_kwh)||0;
    });
    return Object.entries(rm).map(([room,kwh])=>({room,kwh:round3(kwh)}));
  },[appliances,liveReadings]);

  // Heatmap: hour(0-23) vs day-of-week(0-6)
  const heatmapData = useMemo(()=>{
    const grid = Array.from({length:7},()=>Array(24).fill(0));
    const cnt = Array.from({length:7},()=>Array(24).fill(0));
    history.slice(-5000).forEach(r=>{
      const d=new Date(r.timestamp); const dow=d.getDay(); const hr=d.getHours();
      grid[dow][hr]+=r.active_power_w; cnt[dow][hr]++;
    });
    let max=0;
    const result=[];
    for(let d=0;d<7;d++) for(let h=0;h<24;h++){
      const avg=cnt[d][h]?grid[d][h]/cnt[d][h]:0;
      if(avg>max)max=avg;
      result.push({day:d,hour:h,avg});
    }
    return {data:result,max};
  },[history]);

  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const getHeatColor = (val, max) => {
    const r = max>0?val/max:0;
    const g = Math.floor(r*255), gr = Math.floor((1-r)*180);
    return `rgb(${g},${gr},0)`;
  };

  return (
    <div className="space-y-6 fade-in">
      {/* Summary Cards */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">

function HistoryTab({history, appliances, onExport, onExportSummary, onClear, onGenerate, apiJson}) {
  const [page, setPage] = useState(1);
  const [filterAppliance, setFilterAppliance] = useState('All');
  const [filterRoom, setFilterRoom] = useState('All');
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const PER_PAGE = 50;

  const filtered = useMemo(()=>{
    return history.filter(r=>{
      if(filterAppliance!=='All'&&r.appliance_name!==filterAppliance) return false;
      if(filterRoom!=='All'&&r.room!==filterRoom) return false;
      if(dateFrom&&r.timestamp<dateFrom) return false;
      if(dateTo&&r.timestamp>dateTo+'T23:59:59') return false;
      return true;
    });
  },[history,filterAppliance,filterRoom,dateFrom,dateTo]);

  const paginated = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const uniqueAppliances = [...new Set(history.map(r=>r.appliance_name))];
  const uniqueRooms = [...new Set(history.map(r=>r.room))];

  // Aggregate by timestamp for table
  const aggregated = useMemo(()=>{
    const byTs = {};
    paginated.forEach(r=>{
      if(!byTs[r.timestamp]) byTs[r.timestamp]={timestamp:r.timestamp,totalPower:0,totalKwh:0,sumV:0,countV:0,topCons:'',topPow:0,cost:0,co2:0};
      byTs[r.timestamp].totalPower+=r.active_power_w;
      byTs[r.timestamp].totalKwh+=r.energy_kwh;
      byTs[r.timestamp].sumV+=r.voltage_v; byTs[r.timestamp].countV++;
      byTs[r.timestamp].cost+=r.cost_inr; byTs[r.timestamp].co2+=r.co2_kg;
      if(r.active_power_w>byTs[r.timestamp].topPow){byTs[r.timestamp].topPow=r.active_power_w;byTs[r.timestamp].topCons=r.appliance_name;}
    });
    return Object.values(byTs).slice(0,50);
  },[paginated]);

  return (
    <div className="space-y-5 fade-in">
      <div className="flex flex-wrap justify-between items-center gap-3">
        <h2 className="font-bold text-lg text-gray-200">📜 History Log</h2>
        <div className="flex flex-wrap gap-2">
          <button className="btn-green text-xs" onClick={onGenerate}>🎲 Generate Data</button>
          <ExportMenu label="↓ Filtered CSV" onCSV={()=>onExport(filtered)} apiJson={filtered} small/>
          <ExportMenu label="↓ All History" onCSV={()=>onExport()} apiJson={history} small/>
          <ExportMenu label="↓ Daily Summary" onCSV={onExportSummary} apiJson={history} small/>
          <button className="btn-red text-xs" onClick={onClear}>🗑️ Clear</button>
        </div>
      </div>
      {/* Filters */}
      <div className="card">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div><label className="text-xs text-gray-400 mb-1 block">Date From</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/></div>
          <div><label className="text-xs text-gray-400 mb-1 block">Date To</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></div>
          <div><label className="text-xs text-gray-400 mb-1 block">Appliance</label><select value={filterAppliance} onChange={e=>setFilterAppliance(e.target.value)}><option>All</option>{uniqueAppliances.map(a=><option key={a}>{a}</option>)}</select></div>
          <div><label className="text-xs text-gray-400 mb-1 block">Room</label><select value={filterRoom} onChange={e=>setFilterRoom(e.target.value)}><option>All</option>{uniqueRooms.map(r=><option key={r}>{r}</option>)}</select></div>
        </div>
        <div className="mt-2 text-xs text-gray-500">{filtered.length.toLocaleString()} of {history.length.toLocaleString()} records</div>
      </div>
      <div className="card">
        <div className="overflow-x-auto">
          <table>
            <thead><tr><th>Timestamp</th><th>Total W</th><th>Total kWh</th><th>Avg V</th><th>Top Consumer</th><th>Cost ₹</th><th>CO₂ kg</th></tr></thead>
            <tbody>
              {aggregated.map((r,i)=>(
                <tr key={i}>
                  <td className="mono text-xs">{new Date(r.timestamp).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour12:false})}</td>
                  <td className="mono text-xs text-green-400">{round3(r.totalPower).toFixed(1)}</td>
                  <td className="mono text-xs">{round3(r.totalKwh).toFixed(4)}</td>
                  <td className="mono text-xs">{r.countV?(r.sumV/r.countV).toFixed(1):'—'}</td>
                  <td className="text-xs text-gray-300">{r.topCons}</td>
                  <td className="mono text-xs text-amber-400">{round3(r.cost).toFixed(3)}</td>
                  <td className="mono text-xs">{round3(r.co2).toFixed(4)}</td>
                </tr>
              ))}
              {aggregated.length===0 && <tr><td colSpan={7} className="text-center text-gray-500 py-8">No records. Click 🎲 Generate Data to populate history.</td></tr>}
            </tbody>
          </table>
        </div>
        {totalPages>1 && (
          <div className="flex items-center gap-2 mt-4 justify-center">
            <button className="btn-green text-xs" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>← Prev</button>
            <span className="text-xs text-gray-400 mono">{page}/{totalPages}</span>
            <button className="btn-green text-xs" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages}>Next →</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SETTINGS TAB ────────────────────────────────────────────────────────────
function SettingsTab({settings, setSettings, onReset}) {
  const set = (k,v) => setSettings(s=>({...s,[k]:v}));
  return (
    <div className="space-y-5 fade-in max-w-lg">
      <h2 className="font-bold text-lg text-gray-200">⚙️ Settings</h2>
      <div className="card space-y-4">
        <h3 className="text-sm font-semibold text-green-400">⚡ Energy Settings</h3>
        <div><label className="text-xs text-gray-400 mb-1 block">Electricity Tariff (₹/kWh)</label><input type="number" step="0.1" value={settings.tariff} onChange={e=>set('tariff',parseFloat(e.target.value))}/></div>
        <div><label className="text-xs text-gray-400 mb-1 block">CO₂ Emission Factor (kg/kWh)</label><input type="number" step="0.01" value={settings.co2} onChange={e=>set('co2',parseFloat(e.target.value))}/></div>
        <div><label className="text-xs text-gray-400 mb-1 block">Grid Base Voltage</label>
          <div className="flex gap-2">{[220,230,240].map(v=><button key={v} onClick={()=>set('voltage',v)} className={`flex-1 py-1.5 text-xs rounded border transition-all ${settings.voltage===v?'border-green-500 bg-green-500/20 text-green-400':'border-gray-700 text-gray-500'}`}>{v}V</button>)}
          </div>
        </div>
      </div>
      <div className="card space-y-4">
        <h3 className="text-sm font-semibold text-green-400">🏠 Device Settings</h3>
        <div><label className="text-xs text-gray-400 mb-1 block">Location / House Name</label><input value={settings.location} onChange={e=>set('location',e.target.value)}/></div>
        <div><label className="text-xs text-gray-400 mb-1 block">Device ID</label><input value={settings.deviceId} onChange={e=>set('deviceId',e.target.value)}/></div>
        <div><label className="text-xs text-gray-400 mb-1 block">Simulation Interval</label>
          <div className="flex gap-2">{[[1,'1min'],[5,'5min'],[15,'15min']].map(([v,l])=><button key={v} onClick={()=>set('interval',v)} className={`flex-1 py-1.5 text-xs rounded border transition-all ${settings.interval===v?'border-green-500 bg-green-500/20 text-green-400':'border-gray-700 text-gray-500'}`}>{l}</button>)}
          </div>
        </div>
        <div className="flex items-center justify-between">
          <label className="text-xs text-gray-400">Auto-save to localStorage</label>
          <button onClick={()=>set('autoSave',!settings.autoSave)} className={`w-12 h-6 rounded-full transition-all relative ${settings.autoSave?'bg-green-600':'bg-gray-700'}`}>
            <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-white transition-all ${settings.autoSave?'right-0.5':'left-0.5'}`}/>
          </button>
        </div>
      </div>
      <div className="card">
        <h3 className="text-sm font-semibold text-red-400 mb-3">⚠️ Danger Zone</h3>
        <button className="btn-red" onClick={onReset}>🗑️ Reset All Data</button>
        <p className="text-xs text-gray-500 mt-2">This will clear all appliances, history, and settings.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
